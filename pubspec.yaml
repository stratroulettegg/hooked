name: hooked
description: "Hooked – Dein Fangbuch, Spot- & Trip-Planer für Raubfischangler."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^15.1.2

  # Lokale Datenbank
  sqflite: ^2.4.2
  path: ^1.9.1

  # Netzwerk / API
  http: ^1.4.0

  # Karten
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  flutter_map_cache: ^1.5.0
  dio_cache_interceptor: ^3.5.0
  dio_cache_interceptor_hive_store: ^3.2.1
  dio: ^5.7.0
  path_provider: ^2.1.5

  # Charts
  fl_chart: ^0.70.2

  # Bilder
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Utils
  intl: ^0.20.2
  shared_preferences: ^2.5.3
  uuid: ^4.5.1
  permission_handler: ^12.0.0+1
  geolocator: ^13.0.4
  url_launcher: ^6.3.1
  share_plus: ^10.1.2
  crypto: ^3.0.5

  # Firebase / Auth
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  google_sign_in: ^6.2.1
  sign_in_with_apple: ^6.1.2

  cupertino_icons: ^1.0.8
  firebase_storage: ^12.4.10
  flutter_local_notifications: ^20.1.0
  timezone: ^0.10.1
  flutter_timezone: ^5.0.2

  # Voice Quick-Add (Speech-to-Text)
  speech_to_text: ^7.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.15
  riverpod_generator: ^2.6.5
  flutter_launcher_icons: ^0.14.2

flutter_launcher_icons:
  image_path: "assets/branding/app_icon.png"
  android: true
  ios: true
  remove_alpha_ios: true
  min_sdk_android: 21
  adaptive_icon_background: "#2D3942"
  adaptive_icon_foreground: "assets/branding/app_icon_foreground.png"
  web:
    generate: false
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true

  assets:
  - assets/images/
  - assets/icons/
  - assets/fische/

  fonts:
  - family: Rajdhani
    fonts:
    - asset: assets/fonts/Rajdhani-Regular.ttf
    - asset: assets/fonts/Rajdhani-SemiBold.ttf
      weight: 600
    - asset: assets/fonts/Rajdhani-Bold.ttf
      weight: 700
  # assets:
  #   - images/a_dot_burr.jpeg
  #   - images/a_dot_ham.jpeg

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/to/resolution-aware-images

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/to/asset-from-package

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/to/font-from-package
